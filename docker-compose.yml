services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-feed-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_feed
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-feed-api
    ports:
      - '3001:3001'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_feed
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL: 'false'
      API_PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
