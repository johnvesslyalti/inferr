name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: cd-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 'TODO: trigger API rollout'
        run: echo "Image ${{ steps.meta.outputs.tags }} pushed to GHCR. Add kubectl/fly/compose deploy step here to apply it to the running environment."

  # NOTE: The web frontend is deployed by the Vercel GitHub integration, not
  # this workflow. A previous `deploy-web` job ran `vercel pull/build/deploy`
  # via the Vercel CLI, but it failed at `vercel pull` (VERCEL_TOKEN lacked
  # access to the project) and was redundant with the integration, so it was
  # removed. If you ever want CLI-driven prebuilt prod deploys instead of the
  # integration, restore it and ensure VERCEL_TOKEN can access the project in
  # .vercel/project.json.
