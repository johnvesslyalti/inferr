apiVersion: batch/v1
kind: CronJob
metadata:
  name: scraper-cronjob
  namespace: default
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: scraper-trigger
              image: curlimages/curl:8.5.0
              command:
                - sh
                - -c
                - |
                  curl -s -S -X POST \
                    -H "Authorization: Bearer $SCRAPER_API_KEY" \
                    http://api-service:3001/scraper/run
              env:
                - name: SCRAPER_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: api-secrets
                      key: SCRAPER_API_KEY
          restartPolicy: OnFailure
