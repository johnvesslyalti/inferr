apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: default
type: Opaque
stringData:
  DB_PASS: "postgres"
  JWT_SECRET: "your-super-secret-jwt-key-here"
  OPENAI_API_KEY: "your-openai-api-key-here"
  SCRAPER_API_KEY: "generate-a-secure-random-scraper-key-here"
  GOOGLE_CLIENT_ID: "your-google-oauth-client-id-here"
  GOOGLE_CLIENT_SECRET: "your-google-oauth-client-secret-here"
  LANGFUSE_PUBLIC_KEY: "your-langfuse-public-key-here"
  LANGFUSE_SECRET_KEY: "your-langfuse-secret-key-here"
